# =============================================================================
# Stack Swarm / Portainer — producción (auth-ms)
# Desplegar en Portainer o: docker stack deploy -c docker-compose.yml pulse_auth_ms
#
# Desarrollo local (NATS + build): docker compose -f docker-compose-deployment.yml up --build
# =============================================================================
version: '3.8'

services:
  auth-ms:
    image: ghcr.io/andesworkforce/auth_ms:latest
    networks:
      - traefik-public
      - nats_nats_internal_network
      - default
      - pulse-db-prod_backend_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      # Límites PROD (tabla interna: API NestJS)
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    environment:
      NODE_ENV: production
      PORT: "${PORT:-3004}"
      DATABASE_URL: "${DATABASE_URL}"
      NATS_HOST: "${NATS_HOST:-72.61.129.234}"
      NATS_PORT: "${NATS_PORT:-4222}"
      NATS_USERNAME: "${NATS_USERNAME:-andes_nats}"
      NATS_PASSWORD: "${NATS_PASSWORD:-andesworkforce_nats}"
      DEV_LOGS: "${DEV_LOGS:-true}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"

networks:
  default:
    name: andes-auth-ms-net
    driver: overlay
  traefik-public:
    external: true
  nats_nats_internal_network:
    external: true
  pulse-db-prod_backend_network:
    external: true
